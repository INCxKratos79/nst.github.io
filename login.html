<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NST gkp - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background-image: url('assets/Background.jpg'); background-size: cover; background-position: center; min-height: 100vh;">
    <nav>
        <div class="logo">
            <a href="index.html"><img src="assets/nst.jpg" alt="NST Institute Logo" style="height:40px;"></a>
        </div>
        <div style="display: flex; align-items: center;">
            <a href="index.html">Back to Home</a>
        </div>
    </nav>

    <div class="login-container" style="background-color: aliceblue;">
        <h2>Student/Staff Login</h2>

        <form id="loginForm">
            <label for="displayName">Full Name</label>
            <input type="text" id="displayName" placeholder="Enter your name">

            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter your email" required>

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter Password" required>

            <button type="submit" class="btn">Login</button>
        </form>

        <p id="message" style="text-align: center; margin-top: 15px; color: red;"></p>

        <p style="text-align: center; margin-top: 15px;">
            <a href="#" id="signupLink">Create New Account</a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://jlmkgqnxegrtjhbibfbi.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_-XHluHuVjDEkRVhgJJxLUQ_ccwuMfJt";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const loginForm = document.getElementById("loginForm");
        const message = document.getElementById("message");
        const signupLink = document.getElementById("signupLink");

        loginForm.addEventListener("submit", async function (e) {
            e.preventDefault();

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();

            message.style.color = "black";
            message.textContent = "Logging in...";

            const { error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                message.style.color = "red";
                message.textContent = error.message;
                return;
            }

            message.style.color = "green";
            message.textContent = "Login successful. Redirecting...";
            setTimeout(() => {
                window.location.href = "index.html";
            }, 1000);
        });

        signupLink.addEventListener("click", async function (e) {
            e.preventDefault();

            const displayName = document.getElementById("displayName").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();

            if (!displayName || !email || !password) {
                message.style.color = "red";
                message.textContent = "Enter full name, email and password first";
                return;
            }

            message.style.color = "black";
            message.textContent = "Creating account...";

            const { error } = await supabaseClient.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        display_name: displayName
                    }
                }
            });

            if (error) {
                message.style.color = "red";
                message.textContent = error.message;
                return;
            }

            message.style.color = "green";
            message.textContent = "Account created. Now login.";
        });
    </script>
</body>
</html>
