<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        Login | NST INSTITUTE</title>
    
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background-image: url('assets/Background.jpg'); background-size: cover; background-position: center; height: 100vh;">
    <nav>
        <div class="logo">
            <a href="index.html"><img src="assets/nst.jpg" alt="NST Institute Logo" style="height:40px;"></a>
        </div>
        <div style="display: flex; align-items: center;">
            <a href="index.html">Back to Home</a>
        </div>
    </nav>

    <div class="login-container" style="background-color: aliceblue;">
        <h2>Student/Staff Login</h2>
        <form>
            <label>Username</label>
            <input type="text" placeholder="Enter your ID" required>
            
            <label>Password</label>
            <input type="password" placeholder="Enter Password" required>
            
            <button type="submit" class="btn">Login</button>
        </form>
        <p style="text-align: center; margin-top: 15px;">
            <a href="#">Forgot Password?</a>
        </p>
    </div>
</body>
</html>
