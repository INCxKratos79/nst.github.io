            <button id="logoutBtn" style="display: none; cursor: pointer; padding: 6px 12px; border: none; border-radius: 5px;">Logout</button>
            <button id="theme-toggle" onclick="toggleTheme()" style="background: none; border: none; cursor: pointer; margin-right: 8px;">
    <img id="theme-icon" src="assets/Drk_48.png" alt="Theme Toggle" style="width: 24px; height: 24px;">
</button>

        </div>
        <div id="nav-menu" class="nav-menu">
            <a href="index.html" style="font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif; font-style:italic">Home</a>
            <a href="management.html" target="_blank" rel="noopener noreferrer" style="font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;">Management</a>

            </div>
        <script>
    function toggleMenu() {
        var menu = document.getElementById('nav-menu');
        menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    }

    document.addEventListener('click', function(e) {
        var menu = document.getElementById('nav-menu');
        var toggle = document.querySelector('.menu-toggle');
        if (menu.style.display === 'block' && !menu.contains(e.target) && !toggle.contains(e.target)) {
            menu.style.display = 'none';
        }
    });

    function toggleTheme() {
        const body = document.body;
        const themeIcon = document.getElementById('theme-icon');

        body.classList.toggle('dark-theme');

        if (body.classList.contains('dark-theme')) {
            themeIcon.src = 'assets/Light_60.png';
            localStorage.setItem('theme', 'dark');
        } else {
            themeIcon.src = 'assets/Drk_48.png';
            localStorage.setItem('theme', 'light');
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        const savedTheme = localStorage.getItem('theme');
        const themeIcon = document.getElementById('theme-icon');

        if (savedTheme === 'dark') {
            document.body.classList.add('dark-theme');
            themeIcon.src = 'assets/Light_60.png';
        } else {
            themeIcon.src = 'assets/Drk_48.png';
        }
    });
</script>
