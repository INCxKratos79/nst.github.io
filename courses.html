<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NST Gkp - Courses</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="logo"><a href="index.html"><img src="assets/nst.jpg" alt="NST Institute Logo" style="height:40px;"></a></div>
        <div style="display: flex; align-items: center;">
            <button id="theme-toggle" onclick="toggleTheme()" style="background: none; border: none; color: white; font-size: 20px; cursor: pointer; margin-right: 20px;">🌙</button>
            <div class="menu-toggle" onclick="toggleMenu()" style="cursor:pointer;">
                <span style="font-size: 28px;">&#9776;</span>
            </div>
        </div>
        <div id="nav-menu" class="nav-menu">
            <a href="index.html" style="font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif; font-style:italic">Home</a>
            <a href="management.html" target="_blank" rel="noopener noreferrer" style="font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;">Management</a>
            <a href="index.html#facilities" style="font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;">Facilities</a>
            <a href="login.html" style="font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;">Login Portal</a>
            <a href="courses.html" style="font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;">Courses</a>
        </div>
            <script>
            // Add hover to open nav menu
            document.querySelector('.menu-toggle').addEventListener('mouseenter', function() {
                document.getElementById('nav-menu').style.display = 'block';
            });
            document.querySelector('.menu-toggle').addEventListener('mouseleave', function() {
                document.getElementById('nav-menu').style.display = 'block';
            });
            </script>
        <script>
            function toggleMenu() {
            var menu = document.getElementById('nav-menu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
            }
            // Optional: Hide menu when clicking outside
            document.addEventListener('click', function(e) {
            var menu = document.getElementById('nav-menu');
            var toggle = document.querySelector('.menu-toggle');
            if (menu.style.display === 'block' && !menu.contains(e.target) && !toggle.contains(e.target)) {
                menu.style.display = 'none';
            }
            });

            function toggleTheme() {
                const body = document.body;
                const themeToggle = document.getElementById('theme-toggle');
                body.classList.toggle('dark-theme');
                if (body.classList.contains('dark-theme')) {
                    themeToggle.textContent = '☀️';
                    localStorage.setItem('theme', 'dark');
                } else {
                    themeToggle.textContent = '🌙';
                    localStorage.setItem('theme', 'light');
                }
            }

            // Load saved theme on page load
            document.addEventListener('DOMContentLoaded', function() {
                const savedTheme = localStorage.getItem('theme');
                const themeToggle = document.getElementById('theme-toggle');
                if (savedTheme === 'dark') {
                    document.body.classList.add('dark-theme');
                    themeToggle.textContent = '☀️';
                } else {
                    themeToggle.textContent = '🌙';
                }
            });
        </script>
    </nav>
<section id="cousres" style=" background: var(--card-bg);padding: 40px;">

            </div>
        </div>
    </section>
